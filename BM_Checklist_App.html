<head>

  <style>
    /* ── Tokens ─────────────────────────────────────────────────────────── */
    :root {
      --evergreen:  #405647;
      --ev-dark:    #2e3e34;
      --ev-light:   #e8ede9;
      --vermilion:  #F15D22;
      --limestone:  #E2DDD9;
      --graphite:   #373536;
      --slate:      #505252;
      --white:      #ffffff;
      --radius:     8px;
      --shadow:     0 2px 8px rgba(0,0,0,.12);
    }

    /* ── Reset ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Arial, sans-serif;
      background: var(--limestone);
      color: var(--graphite);
      min-height: 100vh;
    }

    /* ── Utility ─────────────────────────────────────────────────────────── */
    .hidden { display: none !important; }
    .sr-only { position: absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .app-header {
      background: var(--evergreen);
      color: var(--white);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-logo {
      width: 36px; height: 36px;
      background: var(--white);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900;
      font-size: 13px;
      color: var(--evergreen);
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .header-title { font-size: 15px; font-weight: 700; line-height: 1.2; }
    .header-sub   { font-size: 11px; opacity: .75; margin-top: 1px; }
    .header-meta  { text-align: right; font-size: 11px; opacity: .8; line-height: 1.5; }

    /* ── Setup screen ────────────────────────────────────────────────────── */
    #setup-screen { max-width: 480px; margin: 0 auto; padding: 24px 16px 40px; }
    .setup-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 24px;
      margin-top: 20px;
    }
    .setup-card h2 {
      font-size: 18px;
      color: var(--evergreen);
      margin-bottom: 6px;
    }
    .setup-card p {
      font-size: 13px;
      color: var(--slate);
      margin-bottom: 22px;
      line-height: 1.5;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--slate);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d0cbc7;
      border-radius: 6px;
      font-size: 14px;
      color: var(--graphite);
      background: var(--white);
      appearance: none;
      transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--evergreen);
    }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 13px;
      background: var(--evergreen);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      letter-spacing: .3px;
      transition: background .15s;
    }
    .btn-primary:hover { background: var(--ev-dark); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Checklist screen ────────────────────────────────────────────────── */
    #checklist-screen { display: flex; flex-direction: column; min-height: 100vh; }

    /* Context bar */
    .context-bar {
      background: var(--ev-dark);
      color: var(--white);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      opacity: .9;
    }
    .context-bar strong { font-weight: 600; }
    .context-bar a {
      color: var(--limestone);
      text-decoration: none;
      font-size: 11px;
      opacity: .8;
    }
    .context-bar a:hover { opacity: 1; }

    /* Tabs */
    .tab-bar {
      background: var(--white);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 2px solid var(--limestone);
      position: sticky;
      top: 64px;
      z-index: 90;
    }
    .tab-btn {
      padding: 12px 4px 10px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: var(--slate);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .tab-btn:hover { color: var(--evergreen); }
    .tab-btn.active {
      color: var(--evergreen);
      border-bottom-color: var(--vermilion);
    }
    .tab-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 18px;
      padding: 0 5px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      background: var(--limestone);
      color: var(--slate);
    }
    .tab-btn.active   .tab-pill { background: var(--ev-light); color: var(--evergreen); }
    .tab-btn.done     .tab-pill { background: var(--evergreen); color: var(--white); }
    .tab-btn.done     { color: var(--evergreen); }

    /* Progress strip */
    .progress-strip {
      padding: 10px 16px 6px;
      background: var(--white);
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--slate);
      margin-bottom: 6px;
    }
    .progress-label strong { color: var(--evergreen); }
    .progress-track {
      height: 6px;
      background: var(--limestone);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--evergreen);
      border-radius: 3px;
      transition: width .3s ease;
    }
    .progress-fill.complete { background: var(--vermilion); }

    /* Checklist content */
    .checklist-body { padding: 12px 16px 100px; max-width: 600px; margin: 0 auto; width: 100%; }

    /* Section */
    .section { margin-bottom: 14px; }
    .section-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--white);
      background: var(--evergreen);
      padding: 6px 12px;
      border-radius: 4px 4px 0 0;
    }
    .section-items {
      background: var(--white);
      border: 1px solid #ddd8d4;
      border-top: none;
      border-radius: 0 0 4px 4px;
    }

    /* Item row */
    .item-row {
      display: flex;
      align-items: flex-start;
      padding: 11px 14px;
      border-bottom: 1px solid #f0eceb;
      gap: 12px;
      cursor: pointer;
      transition: background .1s;
      user-select: none;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row:hover { background: #faf8f7; }
    .item-row.checked { background: var(--ev-light); }

    /* Custom checkbox */
    .item-check {
      flex-shrink: 0;
      width: 20px; height: 20px;
      border: 2px solid #c0bbb7;
      border-radius: 4px;
      margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      background: var(--white);
    }
    .item-row.checked .item-check {
      background: var(--evergreen);
      border-color: var(--evergreen);
    }
    .item-check svg { display: none; }
    .item-row.checked .item-check svg { display: block; }

    .item-label {
      font-size: 13.5px;
      line-height: 1.45;
      color: var(--graphite);
      flex: 1;
    }
    .item-row.checked .item-label {
      color: var(--slate);
      text-decoration: line-through;
      text-decoration-color: #b0a9a5;
    }

    /* Notes */
    .notes-area { margin-top: 16px; }
    .notes-area label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--slate);
      margin-bottom: 6px;
    }
    .notes-area textarea {
      width: 100%;
      border: 1.5px solid #d0cbc7;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      color: var(--graphite);
      resize: vertical;
      min-height: 70px;
    }
    .notes-area textarea:focus {
      outline: none;
      border-color: var(--evergreen);
    }

    /* Submit bar */
    .submit-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-top: 1px solid #ddd8d4;
      padding: 12px 16px;
      z-index: 90;
    }
    .submit-bar-inner { max-width: 600px; margin: 0 auto; display: flex; gap: 10px; align-items: center; }
    .btn-submit {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: var(--vermilion);
      color: var(--white);
      transition: background .15s, opacity .15s;
      letter-spacing: .3px;
    }
    .btn-submit:hover { background: #d44e1a; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
    .btn-submit.submitted {
      background: var(--evergreen);
      pointer-events: none;
    }
    .submit-count {
      font-size: 12px;
      color: var(--slate);
      white-space: nowrap;
    }

    /* Submitted banner */
    .submitted-banner {
      background: var(--ev-light);
      border: 1.5px solid var(--evergreen);
      border-radius: 6px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .submitted-banner svg { color: var(--evergreen); flex-shrink: 0; }
    .submitted-banner p { font-size: 13px; color: var(--evergreen); font-weight: 600; }
    .submitted-banner span { font-size: 11px; font-weight: 400; display: block; color: var(--slate); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--graphite);
      color: var(--white);
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--evergreen); }
    #toast.error   { background: #c0392b; }
  </style>
</head>

════════════════════════════════════════════════════════════════════ -->
<div id="setup-screen">
  <header class="app-header">
    <div class="header-brand">
      <div class="header-logo">SES</div>
      <div>
        <div class="header-title">Branch Manager Checklist</div>
        <div class="header-sub">Superior Environmental Solutions</div>
      </div>
    </div>
  </header>

  <div class="setup-card">
    <h2>Start your checklist</h2>
    <p>Select your branch and confirm today's date. Your progress auto-saves as you work.</p>

    <div class="form-group">
      <label for="bm-name">Your Name</label>
      <input type="text" id="bm-name" placeholder="First Last" autocomplete="name" list="bm-list">
      <datalist id="bm-list"></datalist>
    </div>

    <div class="form-group">
      <label for="branch-select">Branch</label>
      <select id="branch-select">
        <option value="">— Select branch —</option>
      </select>
    </div>

    <div class="form-group">
      <label for="checklist-date">Date</label>
      <input type="date" id="checklist-date">
    </div>

    <button class="btn-primary" id="start-btn" onclick="startChecklist()">Begin Checklist →</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════

      Daily<span class="tab-pill" id="pill-daily">0</span>

    <button class="tab-btn"        data-cadence="monthly"   onclick="switchCadence('monthly')">
      Monthly<span class="tab-pill" id="pill-monthly">0</span>
    </button>
    <button class="tab-btn"        data-cadence="quarterly" onclick="switchCadence('quarterly')">
      Quarterly<span class="tab-pill" id="pill-quarterly">0</span>
    </button>
  </div>

  <div class="progress-strip">
    <div class="progress-label">
      <span id="prog-label">0 of 0 complete</span>
      <strong id="prog-pct">0%</strong>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="checklist-body" id="checklist-body"></div>

  <div class="submit-bar">
    <div class="submit-bar-inner">
      <span class="submit-count" id="submit-count"></span>
      <button class="btn-submit" id="submit-btn" onclick="submitCadence()">
        Submit Daily Checklist
      </button>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div id="toast"></div>

  // Populate branches
  const sel = document.getElementById('branch-select');
  CONFIG.branches.forEach(b => {
    const o = document.createElement('option');
    o.value = o.textContent = b;
    sel.appendChild(o);
  });

  // Default date = today
  document.getElementById('checklist-date').value = todayStr();

  // Restore last session if same day
  const saved = lsGet('ses_session');
  if (saved && saved.date === todayStr()) {
    document.getElementById('bm-name').value        = saved.bmName  || '';
    document.getElementById('branch-select').value  = saved.branch  || '';
    document.getElementById('checklist-date').value = saved.date    || todayStr();
  }
})();

/* ══════════════════════════════════════════════════════════════════
   SETUP
══════════════════════════════════════════════════════════════════ */
function startChecklist() {
  const name   = document.getElementById('bm-name').value.trim();
  const branch = document.getElementById('branch-select').value;
  const date   = document.getElementById('checklist-date').value;

  if (!name)   { showToast('Please enter your name.', 'error'); return; }
  if (!branch) { showToast('Please select your branch.', 'error'); return; }
  if (!date)   { showToast('Please confirm the date.', 'error'); return; }

  state.bmName = name;
  state.branch = branch;
  state.date   = date;

  // Load draft from localStorage
  const key = draftKey(name, branch, date);
  const draft = lsGet(key);
  if (draft) {
    state.checks    = draft.checks    || {};
    state.notes     = draft.notes     || {};
    state.submitted = draft.submitted || {};
  } else {
    state.checks    = {};
    state.notes     = {};
    state.submitted = {};
  }

  // Save session
  lsSet('ses_session', { bmName: name, branch, date });

  // Switch screens
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('checklist-screen').classList.remove('hidden');

  // Populate header
  document.getElementById('hdr-name').textContent = name;
  document.getElementById('hdr-date').textContent = formatDate(date);
  document.getElementById('ctx-branch').textContent = branch;

  switchCadence('daily');
}

function resetToSetup() {
  document.getElementById('checklist-screen').classList.add('hidden');
  document.getElementById('setup-screen').classList.remove('hidden');
}

/* ══════════════════════════════════════════════════════════════════
   TAB SWITCHING
══════════════════════════════════════════════════════════════════ */
function switchCadence(cadence) {
  state.cadence = cadence;

  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cadence === cadence);
  });

  renderChecklist();
  updateProgress();
  updateSubmitBar();
  updateAllPills();
}

/* ══════════════════════════════════════════════════════════════════
   RENDER CHECKLIST
══════════════════════════════════════════════════════════════════ */
function renderChecklist() {
  const body     = document.getElementById('checklist-body');
  const cadence  = state.cadence;
  const data     = CHECKLISTS[cadence];
  const checks   = state.checks[cadence] || {};
  const submitted = state.submitted[cadence];

  let html = '';

  // Submitted banner
  if (submitted) {
    html += `
      <div class="submitted-banner">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p>${data.label} checklist submitted
          <span>Submitted on ${formatDate(state.date)} — record saved to Google Sheets.</span>
        </p>
      </div>`;
  }

  // Sections
  data.sections.forEach((section, sIdx) => {
    html += `<div class="section"><div class="section-header">${section.title}</div><div class="section-items">`;
    section.items.forEach((item, iIdx) => {
      const itemKey  = `${sIdx}|${iIdx}`;
      const isChecked = checks[itemKey] || false;
      html += `
        <div class="item-row ${isChecked ? 'checked' : ''}"
             onclick="toggleItem('${cadence}','${itemKey}')"
             role="checkbox" aria-checked="${isChecked}" tabindex="0"
             onkeydown="if(event.key===' '||event.key==='Enter'){toggleItem('${cadence}','${itemKey}');event.preventDefault()}">
          <div class="item-check">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="3">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <span class="item-label">${item}</span>
        </div>`;
    });
    html += `</div></div>`;
  });

  // Notes
  const notes = (state.notes[cadence] || '');
  html += `
    <div class="notes-area">
      <label for="notes-${cadence}">Notes / Blockers (optional)</label>
      <textarea id="notes-${cadence}" placeholder="Add any context for your RM…"
        oninput="saveNote('${cadence}', this.value)">${notes}</textarea>
    </div>`;

  body.innerHTML = html;
  body.scrollTop = 0;
}

/* ══════════════════════════════════════════════════════════════════
   TOGGLE ITEM
══════════════════════════════════════════════════════════════════ */
function toggleItem(cadence, itemKey) {
  if (state.submitted[cadence]) return;  // locked after submit

  if (!state.checks[cadence]) state.checks[cadence] = {};
  state.checks[cadence][itemKey] = !state.checks[cadence][itemKey];

  saveDraft();
  updateProgress();
  updateSubmitBar();
  updateAllPills();

  // Update the row in DOM without full re-render
  const rows = document.querySelectorAll('.item-row');
  const totalItems = countItems(cadence);
  // Find row by rebuild — simpler to re-render just progress
  renderChecklist();
}

function saveNote(cadence, value) {
  if (!state.notes) state.notes = {};
  state.notes[cadence] = value;
  saveDraft();
}

/* ══════════════════════════════════════════════════════════════════
   PROGRESS
══════════════════════════════════════════════════════════════════ */
function countItems(cadence) {
  return CHECKLISTS[cadence].sections.reduce((n, s) => n + s.items.length, 0);
}

function countChecked(cadence) {
  const checks = state.checks[cadence] || {};
  return Object.values(checks).filter(Boolean).length;
}

function updateProgress() {
  const cadence = state.cadence;
  const total   = countItems(cadence);
  const checked = countChecked(cadence);
  const pct     = total ? Math.round((checked / total) * 100) : 0;

  document.getElementById('prog-label').textContent = `${checked} of ${total} complete`;
  document.getElementById('prog-pct').textContent   = `${pct}%`;
  const fill = document.getElementById('prog-fill');
  fill.style.width = pct + '%';
  fill.classList.toggle('complete', pct === 100);
}

function updateAllPills() {
  ['daily', 'weekly', 'monthly', 'quarterly'].forEach(c => {
    const pill = document.getElementById(`pill-${c}`);
    const tab  = document.querySelector(`.tab-btn[data-cadence="${c}"]`);
    if (state.submitted[c]) {
      pill.textContent = '✓';
      tab.classList.add('done');
    } else {
      const checked = countChecked(c);
      const total   = countItems(c);
      pill.textContent = `${checked}/${total}`;
      tab.classList.remove('done');
    }
  });
}

/* ══════════════════════════════════════════════════════════════════
   SUBMIT
══════════════════════════════════════════════════════════════════ */
function updateSubmitBar() {
  const cadence = state.cadence;
  const data    = CHECKLISTS[cadence];
  const btn     = document.getElementById('submit-btn');
  const cnt     = document.getElementById('submit-count');
  const checked = countChecked(cadence);
  const total   = countItems(cadence);

  if (state.submitted[cadence]) {
    btn.textContent = `${data.label} Submitted ✓`;
    btn.classList.add('submitted');
    btn.disabled = true;
    cnt.textContent = '';
  } else {
    btn.textContent = `Submit ${data.label} Checklist`;
    btn.classList.remove('submitted');
    btn.disabled = false;
    cnt.textContent = `${checked}/${total}`;
  }
}

async function submitCadence() {
  const cadence = state.cadence;
  const data    = CHECKLISTS[cadence];
  const checked = countChecked(cadence);
  const total   = countItems(cadence);

  if (checked === 0) {
    showToast('Check at least one item before submitting.', 'error');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Submitting…';
  btn.disabled = true;

  // Build payload
  const payload = buildPayload(cadence);

  // Check if script URL is configured
  if (CONFIG.scriptUrl === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
    // Demo mode — simulate submission
    await sleep(800);
    onSubmitSuccess(cadence);
    showToast('Demo mode: data not saved. Add script URL to CONFIG.', 'error');
    return;
  }

  try {
    const res = await fetch(CONFIG.scriptUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    });
    const json = await res.json();
    if (json.status === 'ok') {
      onSubmitSuccess(cadence);
      showToast(`${data.label} checklist saved!`, 'success');
    } else {
      throw new Error(json.error || 'Unknown error');
    }
  } catch (err) {
    btn.textContent = `Submit ${data.label} Checklist`;
    btn.disabled = false;
    showToast('Submit failed — check your connection.', 'error');
    console.error(err);
  }
}

function onSubmitSuccess(cadence) {
  state.submitted[cadence] = true;
  saveDraft();
  renderChecklist();
  updateProgress();
  updateSubmitBar();
  updateAllPills();
}

function buildPayload(cadence) {
  const data    = CHECKLISTS[cadence];
  const checks  = state.checks[cadence] || {};
  const total   = countItems(cadence);
  const checked = countChecked(cadence);

  // Flatten item states
  const items = {};
  data.sections.forEach((section, sIdx) => {
    section.items.forEach((item, iIdx) => {
      const key = `${sIdx}|${iIdx}`;
      items[`${section.title}: ${item}`] = checks[key] ? 'Yes' : 'No';
    });
  });

  return {
    timestamp:   new Date().toISOString(),
    date:        state.date,
    bm_name:     state.bmName,
    branch:      state.branch,
    cadence:     cadence,
    pct_complete: total ? Math.round((checked / total) * 100) : 0,
    items,
    notes:       (state.notes[cadence] || ''),
  };
}

/* ══════════════════════════════════════════════════════════════════
   PERSISTENCE
══════════════════════════════════════════════════════════════════ */
function draftKey(name, branch, date) {
  return `ses_draft_${name}_${branch}_${date}`.replace(/[^a-zA-Z0-9_]/g, '_');
}

function saveDraft() {
  const key = draftKey(state.bmName, state.branch, state.date);
  lsSet(key, {
    checks:    state.checks,
    notes:     state.notes,
    submitted: state.submitted,
  });
}

function lsGet(key) {
  try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

/* ══════════════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════════════ */
function todayStr() {
  return new Date().toLocaleDateString('en-CA');  // YYYY-MM-DD in local time
}

function formatDate(str) {
  if (!str) return '';
  const [y, m, d] = str.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m,10)-1]} ${parseInt(d,10)}, ${y}`;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let toastTimer;
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}
</script>
